version: '3.8'

services:
  # Development service
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-dev
    ports:
      - "4200:4200"
    volumes:
      - ./src:/src
      - /src/node_modules
    environment:
      - NODE_ENV=development
      - ANGULAR_ENV=development
    command: npm start -- --host 0.0.0.0 --poll
    networks:
      - portfolio-network
    profiles:
      - dev

  # Production service
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: portfolio-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network
    profiles:
      - prod

networks:
  portfolio-network:
    driver: bridge

volumes:
  node_modules:
